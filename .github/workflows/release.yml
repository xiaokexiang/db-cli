name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: arm64
          # macOS
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          # Linux
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Download dependencies
        run: go mod download
        working-directory: db-cli

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          go build -ldflags="-s -w -X github.com/xiaokexiang/db-cli/cmd.Version=${GITHUB_REF#refs/tags/} -X github.com/xiaokexiang/db-cli/cmd.Commit=${GITHUB_SHA::8} -X github.com/xiaokexiang/db-cli/cmd.Date=\"$BUILD_DATE\"" -o db-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }} ./cmd/db-cli
        working-directory: db-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: db-cli/db-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          retention-days: 1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: db-cli-*
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Draft Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ### Using npm (Recommended)

            \`\`\`bash
            npx db-cli-skill install
            \`\`\`

            ### Manual Download

            Download the appropriate binary for your platform:

            - **Windows x64**: `db-cli-windows-amd64.exe`
            - **Windows ARM64**: `db-cli-windows-arm64.exe`
            - **macOS Intel**: `db-cli-darwin-amd64`
            - **macOS Apple Silicon**: `db-cli-darwin-arm64`
            - **Linux x64**: `db-cli-linux-amd64`
            - **Linux ARM64**: `db-cli-linux-arm64`

            Make the binary executable and place it in your PATH.

            ## Supported Databases

            - MySQL 5.7-8.x
            - Dameng DM8 (达梦数据库)
          draft: true
          prerelease: ${{ contains(github.ref, '-') }}

      - name: Upload Windows x64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/db-cli-windows-amd64/db-cli-windows-amd64.exe
          asset_name: db-cli-windows-amd64.exe
          asset_content_type: application/octet-stream

      - name: Upload Windows ARM64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/db-cli-windows-arm64/db-cli-windows-arm64.exe
          asset_name: db-cli-windows-arm64.exe
          asset_content_type: application/octet-stream

      - name: Upload macOS Intel
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/db-cli-darwin-amd64/db-cli-darwin-amd64
          asset_name: db-cli-darwin-amd64
          asset_content_type: application/octet-stream

      - name: Upload macOS Apple Silicon
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/db-cli-darwin-arm64/db-cli-darwin-arm64
          asset_name: db-cli-darwin-arm64
          asset_content_type: application/octet-stream

      - name: Upload Linux x64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/db-cli-linux-amd64/db-cli-linux-amd64
          asset_name: db-cli-linux-amd64
          asset_content_type: application/octet-stream

      - name: Upload Linux ARM64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/db-cli-linux-arm64/db-cli-linux-arm64
          asset_name: db-cli-linux-arm64
          asset_content_type: application/octet-stream
